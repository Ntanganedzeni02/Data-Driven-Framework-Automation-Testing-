status = error
name = Log4j2Config

# ======================
# Console Appender
# ======================
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5level %c - %msg%n

# ======================
# Application Log File
# ======================
appender.file.type = File
appender.file.name = FileAppender
appender.file.fileName = C:\\Users\\Ntanga101\\Documents\\DataDrivenFramework\\src\\test\\resources\\logs\\application.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5level %c - %msg%n

# ======================
# Selenium Log File
# ======================
appender.selenium.type = File
appender.selenium.name = SeleniumAppender
appender.selenium.fileName = C:\\Users\\Ntanga101\\Documents\\DataDrivenFramework\\src\\test\\resources\\logs\\selenium.log
appender.selenium.layout.type = PatternLayout
appender.selenium.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5level %c - %msg%n

# ======================
# Root Logger
# ======================
rootLogger.level = debug
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender

# ======================
# Selenium Logger (custom)
# ======================
logger.selenium.name = org.openqa.selenium
logger.selenium.level = debug
logger.selenium.appenderRefs = selenium
logger.selenium.appenderRef.selenium.ref = SeleniumAppender
logger.selenium.additivity = false